spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  fraud:
    threshold: 100
    window-minutes: 10
    enable-self-visit: false
